<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FixUp</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- HERO SECTION -->
<section class="hero">
  <div class="hero-content">
    <button onclick="scrollToForm()">Get Started</button>
    <p>Pickup → Repair → Return</p>
  </div>
</section>

<!-- FORM SECTION -->
<section class="form-section" id="form">

  <!-- FORM CONTAINER -->
  <div id="formContainer">
    <h2>Book a Repair</h2>

    <form id="repairForm">
      <select id="service" required>
        <option value="">Select Service</option>
        <option>Screen Repair</option>
        <option>Battery Replacement</option>
        <option>Software Issue</option>
      </select>

      <input type="text" id="name" placeholder="Your Name" required>
      <input type="tel" id="phone" placeholder="Phone Number" required>
      <input type="text" id="device" placeholder="Device (e.g. iPhone 11)" required>
      <textarea id="problem" placeholder="Describe the problem"></textarea>

      <button type="submit">Submit</button>
    </form>
  </div>

  <!-- SUCCESS MESSAGE -->
  <div id="successMessage" style="display:none;">
    <h2>Request Submitted</h2>
    <p>We will contact you shortly.</p>
    <button onclick="resetForm()">Submit Another</button>
  </div>

</section>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="js/firebase.js"></script>
<script src="js/app.js"></script>

</body>
</html>
