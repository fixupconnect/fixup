<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="description" content="FixUp provides fast and reliable mobile and laptop repair services in Kerala. Book your repair now.">
  <meta charset="UTF-8">
  <meta name="author" content="Joel Jogi">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="index, follow">
  <meta property="og:title" content="FixUp - Fast Repair Service">
<meta property="og:description" content="Quick mobile & laptop repair near you.">
<meta property="og:image" content="https://fixupconnect.in/images/preview.webp">
<meta property="og:url" content="https://fixupconnect.in">
  <title>FixUp</title>
  <link rel="stylesheet" href="css/style.css">
<link rel="icon" type="image/svg+xml" href="images/favicon.svg">
<link rel="canonical" href="https://fixupconnect.in/">
</head>
<body>

<!-- MENU -->
<div class="menu-icon" onclick="toggleMenu()">
  <div></div><div></div><div></div>
</div>

<div class="side-menu" id="sideMenu">
  <a href="index.html" onclick="closeMenu()">Home</a>
  <a href="about.html" onclick="closeMenu()">About</a>
  <a href="features.html" onclick="closeMenu()">Features</a>
  <a href="#form" onclick="closeMenu()">Book Repair</a>
</div>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <button onclick="scrollToForm()">Get Started</button>
    <p>Pickup → Repair → Return</p>
  </div>
</section>

<!-- FORM -->
<section class="form-section" id="form">
  <div class="form-wrapper">

    <div class="form-box">
      <div id="formContainer">
        <h2>Book a Repair</h2>

        <form id="repairForm">
          <select id="service" required>
            <option value="">Select Service</option>
            <option>Screen Repair</option>
            <option>Battery Replacement</option>
            <option>Software Issue</option>
            <option>Other issue</option>
          </select>

          <input type="text" id="name" placeholder="Your Name" required>
          <input type="tel" id="phone" placeholder="Phone Number" required>
          <input type="text" id="device" placeholder="Device" required>
          <textarea id="problem" placeholder="Describe the problem"></textarea>

          <p id="locationText">Location not selected</p>

          <button type="button" onclick="getLocation()">Use My Location</button>
          <button type="submit">Submit</button>
        </form>
      </div>

      <!-- ONLY ONE SUCCESS MESSAGE -->
      <div id="successMessage" style="display:none;">
        <h2>Request Submitted</h2>
        <p>We will contact you shortly.</p>
        <button onclick="resetForm()">Submit Another</button>
      </div>
    </div>

    <div id="map"></div>

  </div>
</section>

<!-- SCRIPTS -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCsDSkyIxVIaXMqnMXDaiC7SKxRctK73wI&libraries=places"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script src="js/firebase.js"></script>
<script src="js/app.js"></script>

</body>
</html>
